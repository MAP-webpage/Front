<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>MAP 회원가입</title>
    <link rel = "stylesheet" href="account.css">
</head>
<body>
    <div class = "createAccount-container">
        <img src = "logo.png" class = "logo">
        <div class = "createAccount-box">
            <div class="createAccount-box1">
                <input type = "text" placeholder = "아이디" class = "input-field1">
                <input type = "password" placeholder = "비밀번호" class = "input-field1">
                <input type = "passwordCheck" placeholder = "비밀번호 확인" class = "input-field1">
            </div>
            <div class = "createAccount-box2">
                <input type = "name" placeholder = "이름" class = "input-field2">
                <input type = "studentNumber" placeholder = "학번" class = "input-field2">
                <input type = "vertificationCode" placeholder = "인증코드" class = "input-field2">
                <button>확인</button>
            </div>
            <button class = "request-button">가입요청</button>
            </div>
        </div>
        <footer>
            <p>2024, 명지대학교 컴퓨터공학과 스터디 MAP</p>
            <p>Study-MAP of the Department of Computer Engineering, Myongji University</p>
        </footer>
    </div>
<script src = account.js></script>
</body>
